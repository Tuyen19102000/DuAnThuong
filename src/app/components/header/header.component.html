<header class="site-header" [class.is-scrolled]="isScrolled">
  <div class="header-inner">
    <a routerLink="/" class="brand" aria-label="RIWAY MEDIA GROUP home" (click)="closeMenu()">
      <img src="/logoReway.png" alt="RIWAY MEDIA GROUP">
    </a>

    <nav class="desktop-nav" aria-label="Main navigation">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact || false }">
        {{ item.label }}
      </a>
    </nav>

    <div class="header-actions">
      <a routerLink="/contact-us" class="partner-link">Partner</a>
      <button type="button" class="menu-button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<div class="menu-backdrop" [class.open]="isMenuOpen" (click)="closeMenu()"></div>

<aside class="side-menu" [class.open]="isMenuOpen" aria-label="RIWAY side menu">
  <div class="side-menu-head">
    <img src="/logoReway.png" alt="RIWAY MEDIA GROUP">
    <button type="button" (click)="closeMenu()" aria-label="Close menu">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="side-menu-body">
    <p class="menu-eyebrow">Global Media Network</p>
    <h2>Music, AI audio and cinematic content partnerships.</h2>

    <nav aria-label="Side navigation">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact || false }"
        (click)="closeMenu()">
        {{ item.label }}
      </a>
    </nav>

    <div class="menu-contact">
      <span>Contact</span>
      <a href="mailto:contact&#64;riwaymedia.com">contact&#64;riwaymedia.com</a>
      <a href="tel:+84967825178">+84 967 825 178</a>
    </div>

    <a routerLink="/contact-us" class="menu-cta" (click)="closeMenu()">Start A Partnership</a>
  </div>
</aside>
